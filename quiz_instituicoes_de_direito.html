<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz · Instituições de Direito</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0f0f0f;
    --paper: #ffffff;
    --accent: #d4420a;
    --accent2: #1a56a0;
    --muted: #6b7280;
    --surface: #f7f6f3;
    --border: #e5e0d8;
    --easy: #16a34a;
    --med: #d97706;
    --hard: #dc2626;
    --correct: #15803d;
    --wrong: #dc2626;
    --radius: 12px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    line-height: 1.6;
  }

  /* ── HEADER ── */
  .header {
    background: var(--ink);
    color: var(--paper);
    padding: 32px 24px 24px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      45deg, transparent, transparent 20px,
      rgba(255,255,255,.03) 20px, rgba(255,255,255,.03) 40px
    );
  }
  .header-eyebrow {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
    position: relative;
  }
  .header h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(26px, 5vw, 42px);
    font-weight: 800;
    line-height: 1.1;
    position: relative;
  }
  .header-sub {
    font-size: 14px;
    color: rgba(255,255,255,.55);
    margin-top: 8px;
    position: relative;
  }
  .header-topics {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-top: 16px;
    position: relative;
  }
  .topic-chip {
    background: rgba(255,255,255,.1);
    border: 1px solid rgba(255,255,255,.15);
    border-radius: 99px;
    padding: 4px 12px;
    font-size: 12px;
    color: rgba(255,255,255,.8);
  }

  /* ── CONTROLS ── */
  .controls {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
    justify-content: center;
  }
  .control-group { display: flex; flex-direction: column; gap: 4px; }
  .control-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); font-weight: 500; }
  .btn-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .filter-btn {
    padding: 7px 14px;
    border: 1.5px solid var(--border);
    background: var(--paper);
    border-radius: 99px;
    font-size: 13px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all .18s;
    color: var(--ink);
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .start-btn {
    padding: 10px 28px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 99px;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: .5px;
    transition: transform .15s, box-shadow .15s;
  }
  .start-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(212,66,10,.35); }
  .start-btn:active { transform: translateY(0); }

  /* ── PROGRESS ── */
  .progress-bar-wrap {
    padding: 0 24px;
    max-width: 760px;
    margin: 20px auto 0;
  }
  .progress-info {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .progress-track {
    height: 6px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 99px;
    transition: width .4s cubic-bezier(.4,0,.2,1);
  }

  /* ── MAIN ── */
  #quiz-area {
    max-width: 760px;
    margin: 0 auto;
    padding: 24px 24px 60px;
  }

  /* ── QUESTION CARD ── */
  .q-card {
    background: var(--paper);
    border: 1.5px solid var(--border);
    border-radius: 18px;
    padding: 28px;
    margin-bottom: 20px;
    animation: slideUp .3s ease;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .q-meta {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .badge {
    padding: 3px 10px;
    border-radius: 99px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .badge-easy   { background: #dcfce7; color: var(--easy); }
  .badge-medium { background: #fef3c7; color: var(--med); }
  .badge-hard   { background: #fee2e2; color: var(--hard); }
  .badge-topic  { background: var(--surface); color: var(--muted); border: 1px solid var(--border); }
  .q-num { font-size: 12px; color: var(--muted); margin-left: auto; }
  .q-text {
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 500;
    line-height: 1.55;
    margin-bottom: 20px;
  }

  /* ── OPTIONS ── */
  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt-btn {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px 16px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    line-height: 1.5;
    text-align: left;
    transition: border-color .15s, background .15s, transform .1s;
    color: var(--ink);
    width: 100%;
  }
  .opt-btn:hover:not(:disabled) {
    border-color: var(--accent2);
    background: #eff6ff;
    transform: translateX(3px);
  }
  .opt-btn:disabled { cursor: default; }
  .opt-letter {
    width: 24px; height: 24px;
    border-radius: 6px;
    background: var(--border);
    color: var(--muted);
    font-size: 12px;
    font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background .15s, color .15s;
  }
  .opt-btn.correct { border-color: var(--correct); background: #f0fdf4; }
  .opt-btn.correct .opt-letter { background: var(--correct); color: #fff; }
  .opt-btn.wrong   { border-color: var(--wrong);   background: #fef2f2; }
  .opt-btn.wrong   .opt-letter { background: var(--wrong);   color: #fff; }

  /* VF */
  .vf-row { display: flex; gap: 12px; }
  .vf-btn {
    flex: 1;
    padding: 14px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    transition: all .15s;
    color: var(--ink);
  }
  .vf-btn:hover:not(:disabled) { border-color: var(--accent2); background: #eff6ff; }
  .vf-btn.correct { border-color: var(--correct); background: #f0fdf4; color: var(--correct); }
  .vf-btn.wrong   { border-color: var(--wrong);   background: #fef2f2; color: var(--wrong);   }
  .vf-btn:disabled { cursor: default; }

  /* ── FEEDBACK ── */
  .feedback {
    margin-top: 16px;
    padding: 14px 16px;
    border-radius: var(--radius);
    font-size: 14px;
    line-height: 1.55;
    display: none;
    animation: fadeIn .25s ease;
  }
  @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
  .feedback.show { display: block; }
  .feedback-correct { background: #f0fdf4; border-left: 3px solid var(--correct); color: #15803d; }
  .feedback-wrong   { background: #fef2f2; border-left: 3px solid var(--wrong);   color: #991b1b; }
  .feedback strong { font-weight: 600; }

  .next-btn {
    margin-top: 16px;
    padding: 10px 24px;
    background: var(--ink);
    color: var(--paper);
    border: none;
    border-radius: 99px;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    display: none;
    letter-spacing: .5px;
    transition: opacity .15s;
  }
  .next-btn.show { display: inline-flex; align-items: center; gap: 6px; }
  .next-btn:hover { opacity: .8; }

  /* ── RESULT ── */
  #result-screen { display: none; padding: 0 0 60px; }
  #result-screen.show { display: block; }
  .result-hero {
    background: var(--ink);
    color: var(--paper);
    padding: 48px 24px;
    text-align: center;
  }
  .score-ring {
    width: 120px; height: 120px;
    border-radius: 50%;
    border: 4px solid rgba(255,255,255,.15);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    margin: 0 auto 20px;
    position: relative;
  }
  .score-ring::after {
    content: '';
    position: absolute; inset: -6px;
    border-radius: 50%;
    border: 3px solid var(--accent);
    border-right-color: transparent;
    animation: spin 1.5s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .score-pct {
    font-family: 'Syne', sans-serif;
    font-size: 32px; font-weight: 800;
  }
  .score-label { font-size: 12px; color: rgba(255,255,255,.5); }
  .result-title { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700; margin-bottom: 6px; }
  .result-sub { color: rgba(255,255,255,.6); font-size: 14px; }

  .result-body {
    max-width: 760px;
    margin: 0 auto;
    padding: 28px 24px;
  }
  .section-title {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1.5px solid var(--border);
  }

  /* breakdown bars */
  .breakdown-item { margin-bottom: 14px; }
  .breakdown-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 6px;
  }
  .breakdown-label { font-size: 13px; font-weight: 500; flex: 0 0 140px; }
  .breakdown-count { font-size: 12px; color: var(--muted); margin-left: auto; white-space: nowrap; }
  .bar-track {
    height: 8px;
    background: var(--border);
    border-radius: 99px;
    flex: 1;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 99px;
    transition: width .6s cubic-bezier(.4,0,.2,1);
  }
  .bar-fill.easy   { background: var(--easy); }
  .bar-fill.med    { background: var(--med); }
  .bar-fill.hard   { background: var(--hard); }
  .bar-fill.topic  { background: var(--accent2); }
  .warn-chip {
    display: inline-block;
    padding: 3px 10px;
    background: #fef3c7;
    color: #92400e;
    border-radius: 99px;
    font-size: 11px;
    font-weight: 600;
    margin-left: 6px;
    vertical-align: middle;
  }

  /* recs */
  .rec-list { list-style: none; }
  .rec-list li {
    padding: 10px 14px;
    background: #fff8f0;
    border-left: 3px solid var(--accent);
    border-radius: 0 8px 8px 0;
    font-size: 13px;
    margin-bottom: 8px;
    line-height: 1.5;
  }

  /* review */
  .review-card {
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 14px;
  }
  .review-header {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px 16px;
    background: var(--surface);
    cursor: pointer;
  }
  .review-icon {
    width: 22px; height: 22px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; flex-shrink: 0; margin-top: 1px;
    font-weight: 700;
  }
  .review-icon.w { background: #fee2e2; color: var(--wrong); }
  .review-q { font-size: 13px; font-weight: 500; flex: 1; line-height: 1.5; }
  .review-body {
    padding: 14px 16px;
    background: var(--paper);
    display: none;
    border-top: 1px solid var(--border);
    font-size: 13px;
    line-height: 1.55;
  }
  .review-body.open { display: block; }
  .review-answer { margin-bottom: 6px; }
  .review-answer span { font-weight: 600; }
  .review-expl { color: var(--muted); }

  .retry-btn {
    display: block;
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 24px;
    transition: opacity .15s;
  }
  .retry-btn:hover { opacity: .85; }

  /* ── EMPTY STATE ── */
  .empty { text-align: center; padding: 60px 24px; color: var(--muted); }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }

  /* ── MOBILE ── */
  @media (max-width: 520px) {
    .controls { flex-direction: column; align-items: flex-start; }
    .breakdown-label { flex: 0 0 110px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-eyebrow">Estudo · Revisão</div>
  <h1>Instituições de Direito</h1>
  <p class="header-sub">Aulas 6, 7 e 8 · Prof. Vanessa Moretti</p>
  <div class="header-topics">
    <span class="topic-chip">⚖️ Dir. Administrativo</span>
    <span class="topic-chip">📋 Dir. Civil</span>
    <span class="topic-chip">🏢 Dir. Empresarial</span>
  </div>
</div>

<div class="controls">
  <div class="control-group">
    <span class="control-label">Dificuldade</span>
    <div class="btn-row">
      <button class="filter-btn active" data-diff="all">Todas</button>
      <button class="filter-btn" data-diff="easy">Fácil</button>
      <button class="filter-btn" data-diff="medium">Médio</button>
      <button class="filter-btn" data-diff="hard">Difícil</button>
    </div>
  </div>
  <div class="control-group">
    <span class="control-label">Ordem</span>
    <div class="btn-row">
      <button class="filter-btn active" data-order="seq">Sequencial</button>
      <button class="filter-btn" data-order="rand">Embaralhada</button>
    </div>
  </div>
  <button class="start-btn" onclick="startQuiz()">▶ Iniciar Quiz</button>
</div>

<div class="progress-bar-wrap" id="progress-wrap" style="display:none">
  <div class="progress-info">
    <span id="prog-text">Questão 1 de 30</span>
    <span id="score-live">✔ 0 &nbsp;✘ 0</span>
  </div>
  <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
</div>

<div id="quiz-area"></div>
<div id="result-screen"></div>

<script>
const ALL_QUESTIONS = [
  // ═══════════════ DIREITO ADMINISTRATIVO ═══════════════
  {
    id:1, diff:'easy', topic:'Dir. Administrativo',
    type:'def',
    q:'Qual é o conceito correto de Direito Administrativo?',
    opts:[
      'Conjunto de normas que regula a organização da Administração Pública, a atuação do Estado e a relação entre Estado e particulares.',
      'Ramo do direito que trata exclusivamente das relações entre pessoas físicas e empresas privadas.',
      'Conjunto de normas voltadas apenas para a punição de agentes públicos que cometem infrações.',
      'Ramo jurídico que disciplina somente os contratos firmados entre entes federativos.'
    ],
    correct:0,
    expl:'O Direito Administrativo regula a organização e atuação da Administração Pública e as relações entre Estado e particulares — como nas licitações e concessões de serviços públicos.'
  },
  {
    id:2, diff:'easy', topic:'Dir. Administrativo',
    type:'def',
    q:'O acrônimo LIMPE reúne os princípios básicos da Administração Pública. O que cada letra representa?',
    opts:[
      'Legalidade, Impessoalidade, Moralidade, Publicidade e Eficiência.',
      'Licitação, Interesse público, Mérito, Prestação de contas e Equidade.',
      'Legalidade, Imparcialidade, Moralidade, Probidade e Economicidade.',
      'Legitimidade, Impessoalidade, Motivação, Publicidade e Eficiência.'
    ],
    correct:0,
    expl:'LIMPE é o acrônimo consagrado: Legalidade, Impessoalidade, Moralidade, Publicidade e Eficiência. Esses princípios estão previstos no art. 37 da CF/88.'
  },
  {
    id:3, diff:'easy', topic:'Dir. Administrativo',
    type:'def',
    q:'O que é um ato administrativo?',
    opts:[
      'Manifestação de vontade da Administração Pública que produz efeitos jurídicos, como nomeação de servidores ou concessão de licenças.',
      'Decisão tomada exclusivamente pelo Poder Legislativo para criar novas normas administrativas.',
      'Acordo bilateral entre dois entes privados para transferência de bens ao Estado.',
      'Documento interno sem efeito jurídico, utilizado apenas para organização da estrutura pública.'
    ],
    correct:0,
    expl:'Ato administrativo é a manifestação de vontade da Administração Pública com efeitos jurídicos. Exemplos clássicos: multa, licença, nomeação de servidor.'
  },
  {
    id:4, diff:'easy', topic:'Dir. Administrativo',
    type:'def',
    q:'Qual é a finalidade principal da licitação?',
    opts:[
      'Garantir igualdade entre concorrentes, transparência nas contratações e a melhor proposta para o poder público.',
      'Permitir que o poder público escolha livremente fornecedores de sua confiança sem processo formal.',
      'Reduzir o número de empresas que podem contratar com o governo, priorizando as de maior porte.',
      'Exclusivamente fiscalizar o cumprimento de contratos já firmados pela Administração.'
    ],
    correct:0,
    expl:'A licitação existe para evitar corrupção, garantir concorrência e buscar o melhor custo-benefício para o poder público.'
  },
  {
    id:5, diff:'easy', topic:'Dir. Administrativo',
    type:'def',
    q:'Qual modalidade de licitação é indicada para a compra de bens e serviços comuns, sendo a mais utilizada na prática?',
    opts:[
      'Pregão, adequado para aquisição de bens e serviços com padrões de desempenho e qualidade objetivamente definidos.',
      'Concorrência, destinada a contratos de grande porte e ampla participação de licitantes.',
      'Tomada de Preços, voltada para empresas previamente cadastradas em registros cadastrais.',
      'Dispensa de Licitação, aplicada quando a lei permite contratar sem procedimento competitivo.'
    ],
    correct:0,
    expl:'O Pregão é a modalidade mais utilizada; serve para bens e serviços comuns (materiais, alimentos, equipamentos) e pode ocorrer de forma presencial ou eletrônica.'
  },
  // ─── médio admin ───
  {
    id:6, diff:'medium', topic:'Dir. Administrativo',
    type:'diff',
    q:'Qual é a diferença entre ato administrativo VINCULADO e ato DISCRICIONÁRIO?',
    opts:[
      'No vinculado não há margem de escolha — cumpridos os requisitos legais, o agente deve praticar o ato. No discricionário, a lei concede certa liberdade de decisão.',
      'O vinculado exige aprovação do Judiciário antes de ser praticado; o discricionário é praticado sem qualquer controle.',
      'Ambos concedem liberdade de escolha ao agente, diferenciando-se apenas pelo valor do contrato envolvido.',
      'O discricionário exige motivação expressa e o vinculado pode ser praticado sem qualquer fundamentação.'
    ],
    correct:0,
    expl:'Ato vinculado: concessão de aposentadoria ao preencher os requisitos. Ato discricionário: escolha do local para construir uma escola, onde o gestor pondera conveniência e oportunidade.'
  },
  {
    id:7, diff:'medium', topic:'Dir. Administrativo',
    type:'sit',
    q:'Um prefeito contrata diretamente uma empresa amiga para obras na cidade, sem abrir processo licitatório e sem nenhuma justificativa legal. Qual princípio da LIMPE foi diretamente violado?',
    opts:[
      'Impessoalidade, pois a decisão beneficiou um particular em detrimento do interesse público e da igualdade entre concorrentes.',
      'Eficiência, pois a contratação sem concorrência implica necessariamente maior custo para o erário.',
      'Publicidade, pois o contrato não foi divulgado no Diário Oficial antes de ser firmado.',
      'Legalidade, pois gestores públicos têm ampla liberdade para contratar desde que haja motivação política.'
    ],
    correct:0,
    expl:'A impessoalidade exige que as decisões atendam ao interesse público sem favorecimentos. Também há violação da Legalidade (não seguiu o rito obrigatório), mas o favorecimento direto caracteriza, principalmente, impessoalidade.'
  },
  {
    id:8, diff:'medium', topic:'Dir. Administrativo',
    type:'sit',
    q:'Uma prefeitura precisa contratar urgentemente uma empresa especializada para conter um surto epidêmico. Qual forma de contratação pode ser aplicada?',
    opts:[
      'Dispensa de Licitação, prevista em lei para situações emergenciais que não admitem demora no processo competitivo.',
      'Pregão eletrônico, pois é a modalidade mais ágil e deve ser usada em qualquer emergência pública.',
      'Inexigibilidade de Licitação, aplicável sempre que houver urgência, independentemente de haver concorrentes.',
      'Concorrência simplificada, que permite prazos reduzidos para obras de interesse coletivo urgente.'
    ],
    correct:0,
    expl:'A Dispensa de Licitação é cabível em emergências (art. 75, VIII da Lei 14.133/21). A Inexigibilidade se aplica quando a competição é inviável (ex.: artista exclusivo), não à urgência.'
  },
  {
    id:9, diff:'medium', topic:'Dir. Administrativo',
    type:'diff',
    q:'Qual é a diferença entre Dispensa e Inexigibilidade de Licitação?',

    q:'[PEGADINHA] "O registro na Junta Comercial tem natureza meramente burocrática e não altera os direitos e obrigações dos sócios perante terceiros." Analise essa afirmação:',
    opts:[
      'Falsa. O registro tem natureza constitutiva: é ele que cria a personalidade jurídica, separando o patrimônio da empresa do dos sócios e alterando fundamentalmente a responsabilidade perante credores.',
      'Verdadeira. O registro é apenas declaratório e formaliza uma situação já existente desde o início das atividades.',
      'Verdadeira, pois os sócios já respondem de forma limitada desde que contribuam com o capital inicial acordado.',
      'Falsa apenas quanto aos contratos com o poder público, nos quais o registro é indispensável para a participação em licitações.'
    ],
    correct:0,
    expl:'PEGADINHA! O registro tem efeito CONSTITUTIVO — não é mera formalidade. Sem registro: sociedade em comum, responsabilidade pessoal ilimitada. Com registro: personalidade jurídica própria, separação patrimonial, limitação de responsabilidade. A diferença é fundamental e frequentemente explorada em questões.'
  }
];

// ─────────── STATE ───────────
let state = {
  diff: 'all',
  order: 'seq',
  questions: [],
  idx: 0,
  answers: [],    // {qi, chosen, correct}
  score: 0,
  started: false
};

// ─────────── FILTER BUTTONS ───────────
document.querySelectorAll('[data-diff]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-diff]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.diff = btn.dataset.diff;
  });
});
document.querySelectorAll('[data-order]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-order]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.order = btn.dataset.order;
  });
});

// ─────────── START ───────────
function startQuiz() {
  let qs = ALL_QUESTIONS.filter(q => state.diff === 'all' || q.diff === state.diff);
  if (!qs.length) { alert('Nenhuma questão para o filtro selecionado.'); return; }
  if (state.order === 'rand') qs = shuffle([...qs]);
  state.questions = qs;
  state.idx = 0;
  state.answers = [];
  state.score = 0;
  state.started = true;

  document.getElementById('result-screen').classList.remove('show');
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('progress-wrap').style.display = 'block';
  renderQuestion();
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ─────────── RENDER QUESTION ───────────
function renderQuestion() {
  const q = state.questions[state.idx];
  const total = state.questions.length;
  const pct = (state.idx / total) * 100;

  document.getElementById('prog-text').textContent = `Questão ${state.idx + 1} de ${total}`;
  document.getElementById('score-live').innerHTML = `✔ ${state.score} &nbsp;✘ ${state.answers.filter(a=>!a.correct).length}`;
  document.getElementById('prog-fill').style.width = pct + '%';

  const diffLabel = { easy:'Fácil', medium:'Médio', hard:'Difícil' }[q.diff];
  const diffClass = { easy:'badge-easy', medium:'badge-medium', hard:'badge-hard' }[q.diff];

  let optsHTML = '';
  if (q.type === 'vf') {
    optsHTML = `<div class="vf-row">
      <button class="vf-btn" onclick="answer(0)">${q.opts[0]}</button>
      <button class="vf-btn" onclick="answer(1)">${q.opts[1]}</button>
    </div>`;
  } else {
    const letters = ['A','B','C','D'];
    optsHTML = `<div class="options">` + q.opts.map((o, i) =>
      `<button class="opt-btn" onclick="answer(${i})">
        <span class="opt-letter">${letters[i]}</span>
        <span>${o}</span>
       </button>`
    ).join('') + `</div>`;
  }

  document.getElementById('quiz-area').innerHTML = `
    <div class="q-card" id="qcard">
      <div class="q-meta">
        <span class="badge ${diffClass}">${diffLabel}</span>
        <span class="badge badge-topic">${q.topic}</span>
        <span class="q-num">${state.idx + 1} / ${total}</span>
      </div>
      <div class="q-text">${q.q}</div>
      ${optsHTML}
      <div class="feedback" id="feedback"></div>
      <button class="next-btn" id="next-btn" onclick="nextQ()">
        ${state.idx + 1 < total ? 'Próxima →' : 'Ver Resultado →'}
      </button>
    </div>`;
}

// ─────────── ANSWER ───────────
function answer(chosen) {
  const q = state.questions[state.idx];
  const isCorrect = chosen === q.correct;
  if (isCorrect) state.score++;

  state.answers.push({ qi: state.idx, chosen, correct: isCorrect, q });

  // disable all buttons
  const btns = document.querySelectorAll('.opt-btn, .vf-btn');
  btns.forEach(b => b.disabled = true);

  // mark correct / wrong
  if (q.type === 'vf') {
    btns.forEach((b, i) => {
      if (i === q.correct) b.classList.add('correct');
      else if (i === chosen && !isCorrect) b.classList.add('wrong');
    });
  } else {
    document.querySelectorAll('.opt-btn').forEach((b, i) => {
      if (i === q.correct) b.classList.add('correct');
      else if (i === chosen && !isCorrect) b.classList.add('wrong');
    });
  }

  // feedback
  const fb = document.getElementById('feedback');
  fb.className = `feedback show feedback-${isCorrect ? 'correct' : 'wrong'}`;
  fb.innerHTML = isCorrect
    ? `<strong>✔ Correto!</strong> ${q.expl}`
    : `<strong>✘ Incorreto.</strong> ${q.expl}`;

  document.getElementById('next-btn').classList.add('show');
  document.getElementById('score-live').innerHTML = `✔ ${state.score} &nbsp;✘ ${state.answers.filter(a=>!a.correct).length}`;
}

// ─────────── NEXT ───────────
function nextQ() {
  state.idx++;
  if (state.idx >= state.questions.length) {
    showResult();
  } else {
    renderQuestion();
    document.getElementById('progress-wrap').style.display = 'block';
  }
}

// ─────────── RESULT ───────────
function showResult() {
  document.getElementById('quiz-area').innerHTML = '';
  document.getElementById('progress-wrap').style.display = 'none';

  const total = state.questions.length;
  const pct = Math.round((state.score / total) * 100);

  // breakdown by diff
  const diffs = ['easy','medium','hard'];
  const diffNames = { easy:'Fácil', medium:'Médio', hard:'Difícil' };
  const diffBreak = {};
  diffs.forEach(d => {
    const qs = state.answers.filter(a => a.q.diff === d);
    const c  = qs.filter(a => a.correct).length;
    diffBreak[d] = { total: qs.length, correct: c, pct: qs.length ? Math.round(c/qs.length*100) : null };
  });

  // breakdown by topic
  const topics = [...new Set(state.answers.map(a => a.q.topic))];
  const topBreak = {};
  topics.forEach(t => {
    const qs = state.answers.filter(a => a.q.topic === t);
    const c  = qs.filter(a => a.correct).length;
    topBreak[t] = { total: qs.length, correct: c, pct: Math.round(c/qs.length*100) };
  });

  // recommendations
  const recs = [];
  diffs.forEach(d => {
    if (diffBreak[d].pct !== null && diffBreak[d].pct < 60) {
      recs.push(`<strong>Dificuldade ${diffNames[d]}</strong>: revise os conceitos e pratique mais questões nesse nível (aproveitamento: ${diffBreak[d].pct}%).`);
    }
  });
  topics.forEach(t => {
    if (topBreak[t].pct < 60) {
      recs.push(`<strong>${t}</strong>: aproveitamento de ${topBreak[t].pct}% — releia o material da aula e refaça o filtro por tópico.`);
    }
  });

  // wrong answers review
  const wrongs = state.answers.filter(a => !a.correct);

  const resultEl = document.getElementById('result-screen');
  resultEl.innerHTML = `
    <div class="result-hero">
      <div class="score-ring">
        <span class="score-pct">${pct}%</span>
        <span class="score-label">${state.score}/${total}</span>
      </div>
      <div class="result-title">${medal(pct)}</div>
      <div class="result-sub">${resultMsg(pct)}</div>
    </div>
    <div class="result-body">

      <div class="section-title">Desempenho por Dificuldade</div>
      ${diffs.map(d => {
        const b = diffBreak[d];
        if (b.total === 0) return '';
        const warn = b.pct < 60 ? '<span class="warn-chip">Revisar</span>' : '';
        return `<div class="breakdown-item">
          <div class="breakdown-row">
            <span class="breakdown-label">${diffNames[d]}${warn}</span>
            <div class="bar-track"><div class="bar-fill ${d}" style="width:${b.pct}%"></div></div>
            <span class="breakdown-count">${b.correct}/${b.total} · ${b.pct}%</span>
          </div>
        </div>`;
      }).join('')}

      <div class="section-title" style="margin-top:28px">Desempenho por Tópico</div>
      ${topics.map(t => {
        const b = topBreak[t];
        const warn = b.pct < 60 ? '<span class="warn-chip">Revisar</span>' : '';
        return `<div class="breakdown-item">
          <div class="breakdown-row">
            <span class="breakdown-label" style="flex:0 0 180px">${t}${warn}</span>
            <div class="bar-track"><div class="bar-fill topic" style="width:${b.pct}%"></div></div>
            <span class="breakdown-count">${b.correct}/${b.total} · ${b.pct}%</span>
          </div>
        </div>`;
      }).join('')}

      ${recs.length ? `
        <div class="section-title" style="margin-top:28px">📌 Recomendações</div>
        <ul class="rec-list">${recs.map(r=>`<li>${r}</li>`).join('')}</ul>
      ` : `<div style="margin-top:28px;padding:14px 16px;background:#f0fdf4;border-left:3px solid #16a34a;border-radius:0 8px 8px 0;font-size:13px;color:#15803d"><strong>🎉 Parabéns!</strong> Aproveitamento excelente em todos os tópicos.</div>`}

      ${wrongs.length ? `
        <div class="section-title" style="margin-top:28px">📖 Revisão das Questões Erradas (${wrongs.length})</div>
        ${wrongs.map((a, idx) => `
          <div class="review-card">
            <div class="review-header" onclick="toggleReview(this)">
              <div class="review-icon w">✘</div>
              <div class="review-q">${idx+1}. ${a.q.q.replace(/\[PEGADINHA\] /,'')}</div>
              <span style="font-size:18px;color:var(--muted);margin-left:8px">›</span>
            </div>
            <div class="review-body">
              <div class="review-answer">Sua resposta: <span style="color:var(--wrong)">${a.q.opts[a.chosen]}</span></div>
              <div class="review-answer">Resposta correta: <span style="color:var(--correct)">${a.q.opts[a.q.correct]}</span></div>
              <div class="review-expl" style="margin-top:8px">${a.q.expl}</div>
            </div>
          </div>
        `).join('')}
      ` : `<div style="margin-top:28px;font-size:14px;color:var(--easy);font-weight:600">🏆 Nenhuma questão errada! Desempenho perfeito.</div>`}

      <button class="retry-btn" onclick="location.reload()">🔄 Refazer Quiz</button>
    </div>
  `;

  resultEl.style.display = 'block';
  resultEl.classList.add('show');
  resultEl.scrollIntoView({ behavior: 'smooth' });
}

function medal(p) {
  if (p >= 90) return '🏆 Desempenho Excelente!';
  if (p >= 75) return '🥈 Muito Bem!';
  if (p >= 60) return '✅ Aprovado!';
  return '📚 Continue Estudando';
}
function resultMsg(p) {
  if (p >= 90) return 'Domínio completo do conteúdo das aulas 6, 7 e 8.';
  if (p >= 75) return 'Bom desempenho! Revise os tópicos com menor aproveitamento.';
  if (p >= 60) return 'Aproveitamento satisfatório. Dedique mais atenção às questões difíceis.';
  return 'Revise o material das aulas e tente novamente.';
}

function toggleReview(header) {
  const body = header.nextElementSibling;
  body.classList.toggle('open');
}
</script>
</body>
</html>
